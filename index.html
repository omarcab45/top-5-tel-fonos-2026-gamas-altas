<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi página - Menú Horizontal</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #eee;
            font-family: verdana;
        }

        #contenedor {
            margin: 0 auto;
            width: 800px;
        }

        #cabecera {
            color: #fff;
            background-color: #000;
            padding: 10px;
        }

        #menu {
            background-color: #999;
            width: 100%;
            padding: 10px;
        }

        #menu ul {
            list-style-type: none;
            display: flex;
            justify-content: space-around;
        }

        #contenido {
            background-color: #ddd;
            width: 800%;
            min-height: 500px;
            padding: 17px;
        }

        h1 {
            color: #c0c;
            font-size: 24px;
        }

        p {
            font-size: 16px;
        }

        a:link, a:visited, a:hover, a:active {
            color: #0f0;
            font-size: 16px;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div id="contenedor">

        <div id="cabecera">
            <p>Texto en el encabezado de la página.</p>
        </div>

				<li><a href="enlace-5.html">Enlace 5</a></li>
            </ul>
        </div>

        </div>

    </div>

</body>
</html>
